# Starship prompt - TokyoNight Night theme
# https://starship.rs/config/

command_timeout = 1000

format = """
$directory $git_branch$git_status$nodejs$python$golang$rust
$character"""

right_format = "$cmd_duration$time"

# TokyoNight Night palette
# Blue: #7aa2f7 | Magenta: #bb9af7 | Yellow: #e0af68 | Green: #9ece6a
# Orange: #ff9e64 | Cyan: #7dcfff | Red: #f7768e | Purple: #9d7cd8

[character]
success_symbol = "[❯](#bb9af7)"
error_symbol = "[❯](#f7768e)"
vimcmd_symbol = "[❮](#9ece6a)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #7aa2f7"
format = "[$path]($style)"

[git_branch]
symbol = " "
style = "#bb9af7"
format = "on [$symbol$branch]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "#e0af68"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 2000
format = "[$duration]($style)"
style = "#737aa2"

[time]
disabled = false
format = " [$time]($style)"
style = "#737aa2"
time_format = "%H:%M:%S"

[nodejs]
symbol = " "
format = "via [$symbol$version]($style) "
style = "#9ece6a"

[python]
symbol = " "
format = "via [$symbol$version]($style) "
style = "#e0af68"

[golang]
symbol = " "
format = "via [$symbol$version]($style) "
style = "#7dcfff"

[rust]
symbol = " "
format = "via [$symbol$version]($style) "
style = "#ff9e64"

# Disabled modules
[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[docker_context]
disabled = true
