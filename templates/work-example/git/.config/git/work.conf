# Loaded by ~/.gitconfig's `[includeIf "gitdir:~/work/"]` block.
# Applies ONLY to repos cloned under ~/work/. Keep work clones there.

[user]
    # email = first.last@corp.example
    # signingkey = ssh-ed25519 AAAA...work-key...

# If your employer requires commit signing with a different key, also set:
# [commit]
#     gpgsign = true

# Work-only URL rewrites — e.g. internal git mirror
# [url "git@git.corp.example:"]
#     insteadOf = https://git.corp.example/

# Work-only HTTP config — e.g. internal CA bundle
# [http]
#     sslCAInfo = /etc/ssl/certs/corp-ca-bundle.pem
