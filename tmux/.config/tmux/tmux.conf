# ============================================================================
# Dotfiles tmux config
# ============================================================================
# Prefix:  C-a
# Sessions:
#   prefix + n     new "scratch-N" session at $HOME
#   prefix + N     new session named after current pane cwd (git repo / basename)
#   prefix + r     smart rename current session (fast, no prompt)
#   prefix + R     rename with prompt, pre-filled with smart-name
#   prefix + X     kill current session (safe — won't detach you from SSH)
#   prefix + Tab   toggle to last-used session
#   prefix + s     fuzzy session switcher (fzf popup)
#   prefix + D     detach client (intentional exit)
# Windows:
#   prefix + t   new window keeping cwd
#   prefix + x   kill pane
#   M-1..M-5     jump to window 1..5
# Panes:
#   prefix + "   split side-by-side (vertical divider)
#   prefix + -   split stacked       (horizontal divider)
#   C-h/j/k/l    seamless pane nav (shared with nvim)
#   prefix + H/J/K/L  resize pane
# Config:
#   prefix + ,   reload config
# ============================================================================

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal & colors (Ghostty sets TERM=xterm-ghostty; keep tmux-256color inside)
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",ghostty:RGB,xterm-ghostty:RGB,xterm-256color:RGB"

# Default shell (fish if available)
if-shell 'command -v fish >/dev/null 2>&1' \
    'run-shell "tmux set-option -g default-shell $(command -v fish)"'

# General
set -g mouse on
set -g set-clipboard on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ============================================================================
# SESSIONS
# ============================================================================

# prefix + n — new "scratch-N" session at $HOME (auto-increment)
bind n run-shell ' \
    i=1; while tmux has-session -t="scratch-$i" 2>/dev/null; do i=$((i+1)); done; \
    tmux new-session -d -s "scratch-$i" -c "$HOME"; \
    tmux switch-client -t "scratch-$i"'

# prefix + N — new session named from current pane cwd (git toplevel / basename)
bind N run-shell ' \
    name=$(~/.config/tmux/bin/smart-name.sh "#{pane_current_path}"); \
    if tmux has-session -t="$name" 2>/dev/null; then \
        tmux switch-client -t "$name"; \
    else \
        tmux new-session -d -s "$name" -c "#{pane_current_path}"; \
        tmux switch-client -t "$name"; \
    fi'

# prefix + r — smart rename: apply smart-name of current pane cwd immediately
bind r run-shell ' \
    name=$(~/.config/tmux/bin/smart-name.sh "#{pane_current_path}"); \
    tmux rename-session "$name" 2>/dev/null && \
        tmux display-message "renamed → $name" || \
        tmux display-message "rename failed: $name may already exist"'

# prefix + R — rename with prompt, pre-filled with smart-name
bind R run-shell ' \
    name=$(~/.config/tmux/bin/smart-name.sh "#{pane_current_path}"); \
    tmux command-prompt -I "$name" -p "rename session:" "rename-session \"%%\""'

# prefix + X — kill current session (switches to next first so we never detach;
# refuses if this is the only session, so SSH connections don't drop)
bind X run-shell '~/.config/tmux/bin/kill-session.sh'

# prefix + Tab — toggle to last-used session (alt-tab for sessions)
bind Tab switch-client -l

# prefix + s — fuzzy session switcher (fzf popup)
bind s display-popup -E -w 50% -h 50% -x C -y C \
    -T " sessions " -S "fg=#7aa2f7" \
    "fish -c fs"

# prefix + D — detach client (for when you DO want to drop out)
bind D detach-client

# ============================================================================
# WINDOWS
# ============================================================================

bind t new-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind x kill-pane

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ============================================================================
# PANES
# ============================================================================

# " = side-by-side (vertical divider), - = stacked (horizontal divider)
bind '"' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %

# Seamless nav with nvim
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================================
# CONFIG
# ============================================================================

bind , source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# ============================================================================
# STATUS (TokyoNight Night)
# ============================================================================

if-shell 'test "$(uname)" = "Darwin"' \
    'set -g status-position top' \
    'set -g status-position bottom'

set -g status-interval 5
set -g status-justify left
set -g status-left-length 50
set -g status-right-length 60

set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26]  "
set -g status-right "#[fg=#565f89]%H:%M "

setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

set -g pane-active-border-style "fg=#7aa2f7,bold"
set -g pane-border-style "fg=#292e42"
set -g message-style "bg=#1a1b26,fg=#7aa2f7"

# ============================================================================
# PLUGINS (TPM) — local-only, no network except plugin fetch on install
# ============================================================================
# Plugins install under ~/.config/tmux/plugins. Resurrect state lives under
# ~/.local/share/tmux/resurrect — no cloud sync.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Auto-bootstrap TPM on first run, then load plugins.
# This must be the LAST line of tmux.conf.
if 'test ! -d ~/.config/tmux/plugins/tpm' \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
run '~/.config/tmux/plugins/tpm/tpm'
