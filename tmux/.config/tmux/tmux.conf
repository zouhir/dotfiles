# Prefix: Ctrl+a (frees Ctrl+b for nested/remote sessions)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal & colors
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",ghostty:RGB,xterm-256color:RGB"

# Shell
set -g default-shell /opt/homebrew/bin/fish

# General
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Pane splitting (intuitive keys)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (match nvim Ctrl+hjkl)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# New window keeps cwd
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Nested session support (F12 toggle) ---
# Press F12 to disable outer prefix (keys pass through to inner tmux)
# Press F12 again to re-enable outer prefix
bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-style "bg=#1a1b26,fg=#565f89" \;\
    set status-left "#[bg=#1a1b26,fg=#565f89] [OFF] " \;\
    refresh-client -S

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    set -u status-left \;\
    refresh-client -S

# --- Status bar (TokyoNight Night) ---
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=#565f89]%H:%M"
set -g status-right-length 20

# Window status
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

# Message style
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
