# Prefix: Ctrl+a (frees Ctrl+b for nested/remote sessions)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal & colors
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",ghostty:RGB,xterm-256color:RGB"

# Shell
if-shell 'command -v fish >/dev/null 2>&1' \
    'run-shell "tmux set-option -g default-shell $(command -v fish)"'

# General
set -g mouse on
set -g set-clipboard on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Pane splitting (intuitive keys)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (match nvim Ctrl+hjkl)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window keeps cwd
bind c new-window -c "#{pane_current_path}"

# Kill pane/session
bind x kill-pane
bind X kill-session

# Fuzzy popups (fp/fs/fr as overlays)
bind p display-popup -E -w 70% -h 60% "fish -c fp"
bind s display-popup -E -w 70% -h 60% "fish -c fs"
bind R display-popup -E -w 70% -h 60% "fish -c fr"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Nested session support (F12 toggle) ---
# Press F12 to disable outer prefix (keys pass through to inner tmux)
# Press F12 again to re-enable outer prefix
bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-style "bg=#16161e,fg=#565f89" \;\
    set status-left "#[bg=#16161e,fg=#565f89,bold] [LOCKED] #[bg=#16161e,fg=#565f89] @#h " \;\
    set status-right "" \;\
    refresh-client -S

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    set -u status-left \;\
    set -u status-right \;\
    refresh-client -S

# --- Status bar (TokyoNight Night) ---
# macOS at the top, Linux at the bottom to avoid stacking
if-shell 'test "$(uname)" = "Darwin"' \
    'set -g status-position top' \
    'set -g status-position bottom'

set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7] @#h #[default] "
set -g status-left-length 50
set -g status-right "#[fg=#565f89]%H:%M"
set -g status-right-length 20

# Window status
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

# Message style
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
