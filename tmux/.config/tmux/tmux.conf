# Prefix: Ctrl+a (frees Ctrl+b for nested/remote sessions)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal & colors
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",ghostty:RGB,xterm-256color:RGB"

# Shell
if-shell 'command -v fish >/dev/null 2>&1' \
    'run-shell "tmux set-option -g default-shell $(command -v fish)"'

# General
set -g mouse on
set -g set-clipboard on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Pane splitting (intuitive keys)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (match nvim Ctrl+hjkl)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window keeps cwd
bind c new-window -c "#{pane_current_path}"

# Kill pane
bind x kill-pane

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ============================================================================
# SESSION-SPACE: unified session/project/workspace commands
# ============================================================================
# Entry: prefix + s  (enters the `session` key table, one-shot)
# A hint line is shown until the next keypress.
#
#   s  switch session        (fs — floating fzf picker)
#   p  pick project          (fp — floating fzf over ~/Projects)
#   r  recent project        (fr — floating fzf over recents)
#   n  new session from cwd  (names session after current dir)
#   N  new named session     (prompt for name)
#   R  rename current        (prompt, pre-filled)
#   d  dev scratch           (creates/attaches to `dev`)
#   x  kill current          (SSH-safe: switches away first)
#   D  detach client
#   q / Esc  cancel
# ============================================================================

bind-key s \
    display-message -d 0 "session-space │ [s]witch [p]roject [r]ecent [n]ew-cwd [N]amed [R]ename [d]ev [x]kill [D]etach │ q/esc cancel" \; \
    switch-client -T session

# Switch sessions (fish function in popup)
bind-key -T session s display-popup -E -w 70% -h 60% -x C -y C \
    -T " switch session " -S "fg=#bb9af7" \
    "fish -c fs"

# Pick project
bind-key -T session p display-popup -E -w 70% -h 60% -x C -y C \
    -T " projects " -S "fg=#bb9af7" \
    "fish -c fp"

# Recent projects
bind-key -T session r display-popup -E -w 70% -h 60% -x C -y C \
    -T " recent " -S "fg=#bb9af7" \
    "fish -c fr"

# New session from current pane's directory
# Session name is the basename of the pane's cwd, with dots replaced by dashes
bind-key -T session n run-shell ' \
    name=$(basename "#{pane_current_path}" | tr "." "-"); \
    tmux has-session -t="$name" 2>/dev/null || \
        tmux new-session -d -s "$name" -c "#{pane_current_path}"; \
    tmux switch-client -t "$name"'

# New named session (prompt)
bind-key -T session N command-prompt -p "new session name:" \
    "new-session -d -s '%%' ; switch-client -t '%%'"

# Rename current session
bind-key -T session R command-prompt -I "#S" -p "rename session:" \
    "rename-session '%%'"

# Dev scratch session
bind-key -T session d run-shell ' \
    tmux has-session -t=dev 2>/dev/null || tmux new-session -d -s dev; \
    tmux switch-client -t dev'

# Kill current session safely: switch to next session first, then kill.
# If it's the last session, tmux exits (expected end-of-day behavior).
bind-key -T session x confirm-before -p "kill session #S? (y/n)" \
    "run-shell 'tmux switch-client -n \\; kill-session -t \"#S\"'"

# Detach client
bind-key -T session D detach-client

# Escape hatches — return to normal mode without doing anything
bind-key -T session q   switch-client -T prefix
bind-key -T session Escape switch-client -T prefix

# ============================================================================
# STATE-AWARE VISUALS
# ============================================================================
# Three states, three colors:
#   idle           → TokyoNight blue    (#7aa2f7)  calm
#   prefix active  → hot pink           (#ff007c)  flashy
#   session-space  → TokyoNight purple  (#bb9af7)  distinct
# ============================================================================

# macOS at the top, Linux at the bottom to avoid stacking with system bars
if-shell 'test "$(uname)" = "Darwin"' \
    'set -g status-position top' \
    'set -g status-position bottom'

set -g status-interval 1
set -g status-justify left
set -g status-left-length 50
set -g status-right-length 60

# Status bar background: flips by state
set -g status-style "bg=#{?client_prefix,#ff007c,#{?#{==:#{client_key_table},session},#bb9af7,#1a1b26}},fg=#{?client_prefix,#1a1b26,#{?#{==:#{client_key_table},session},#1a1b26,#c0caf5}}"

# Left badge: session name normally, PREFIX on prefix, SESSION in session-space
set -g status-left "#{?client_prefix,#[bg=#ff007c#,fg=#1a1b26#,bold] ● PREFIX ● ,#{?#{==:#{client_key_table},session},#[bg=#bb9af7#,fg=#1a1b26#,bold] ◆ SESSION ◆ ,#[bg=#7aa2f7#,fg=#1a1b26#,bold]  #S }}#[default] "

# Right side mirrors state
set -g status-right "#{?client_prefix,#[bg=#ff007c#,fg=#1a1b26#,bold] COMMAND MODE ,#{?#{==:#{client_key_table},session},#[bg=#bb9af7#,fg=#1a1b26#,bold] SESSION-SPACE ,#[fg=#565f89]%H:%M }}#[default]"

# Window status
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders flip on prefix for peripheral-vision feedback
set -g pane-active-border-style "fg=#{?client_prefix,#ff007c,#7aa2f7},bold"
set -g pane-border-style "fg=#{?client_prefix,#ff007c,#292e42}"

# Message style
set -g message-style "bg=#1a1b26,fg=#7aa2f7"

# ============================================================================
# NESTED SESSION SUPPORT (F12 toggle)
# ============================================================================
# Press F12 to disable outer prefix (keys pass through to inner tmux)
# Press F12 again to re-enable outer prefix

bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-style "bg=#16161e,fg=#565f89" \;\
    set status-left "#[bg=#16161e,fg=#565f89,bold] [LOCKED] #[bg=#16161e,fg=#565f89] @#h " \;\
    set status-right "" \;\
    refresh-client -S

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    set -u status-left \;\
    set -u status-right \;\
    refresh-client -S
